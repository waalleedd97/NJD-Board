<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NJD Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    <script src="https://njd-services.net/njd-navbar.js" defer></script>

    <!-- Theme detection before any framework JS -->
    <script>
      (function(){
        var m = document.cookie.match(/njd-theme=(\w+)/);
        var t = m ? m[1] : null;
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <style>
      /* === NJD Loading Screen === */
      :root {
        --njd-loader-bg: #ffffff;
        --njd-loader-icon: #111111;
        --njd-loader-shadow: rgba(0, 0, 0, 0.12);
      }
      .dark {
        --njd-loader-bg: #0a0a1a;
        --njd-loader-icon: #ffffff;
        --njd-loader-shadow: rgba(255, 255, 255, 0.1);
      }

      .njd-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--njd-loader-bg);
      }
      .njd-loader.fade-out {
        opacity: 0;
        transition: opacity 0.3s ease-out;
      }
      .njd-loader .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .njd-loader .morph-container {
        width: 120px;
        height: 120px;
        position: relative;
        animation: njd-bounce-cycle 4s ease-in-out infinite;
      }
      .njd-loader .morph-container .logo-img,
      .njd-loader .morph-container .car-svg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.25s ease;
      }
      .njd-loader .logo-img img {
        width: 100px;
        height: auto;
        filter: brightness(0);
      }
      .dark .njd-loader .logo-img img {
        filter: brightness(0) invert(1);
      }
      .njd-loader .car-svg svg {
        width: 100px;
        height: auto;
      }
      .njd-loader .car-svg svg path,
      .njd-loader .car-svg svg circle,
      .njd-loader .car-svg svg line,
      .njd-loader .car-svg svg rect {
        stroke: var(--njd-loader-icon);
        fill: none;
      }
      .njd-loader .logo-img {
        animation: njd-logo-vis 4s ease-in-out infinite;
      }
      .njd-loader .car-svg {
        animation: njd-car-vis 4s ease-in-out infinite;
      }
      .njd-loader .bounce-shadow {
        width: 60px;
        height: 8px;
        border-radius: 50%;
        background: var(--njd-loader-shadow);
        animation: njd-shadow-cycle 4s ease-in-out infinite;
      }

      @keyframes njd-logo-vis {
        0%   { opacity: 1; }
        22%  { opacity: 1; }
        25%  { opacity: 0; }
        72%  { opacity: 0; }
        75%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes njd-car-vis {
        0%   { opacity: 0; }
        22%  { opacity: 0; }
        25%  { opacity: 1; }
        72%  { opacity: 1; }
        75%  { opacity: 0; }
        100% { opacity: 0; }
      }
      @keyframes njd-bounce-cycle {
        0%   { transform: translateY(0) scale(1); }
        4%   { transform: translateY(-8px) scale(1.02); }
        8%   { transform: translateY(0) scale(1); }
        12%  { transform: translateY(-6px) scale(1.01); }
        16%  { transform: translateY(0) scale(1); }
        20%  { transform: translateY(-5px) scale(1.01); }
        22%  { transform: translateY(0) scale(1); }
        25%  { transform: translateY(-35px) scale(0.85); }
        28%  { transform: translateY(0) scale(1.08); }
        31%  { transform: translateY(-4px) scale(1); }
        33%  { transform: translateY(0) scale(1); }
        37%  { transform: translateY(0) scale(1); }
        40%  { transform: translateY(-8px) scale(1.02); }
        44%  { transform: translateY(0) scale(1); }
        48%  { transform: translateY(-6px) scale(1.01); }
        52%  { transform: translateY(0) scale(1); }
        56%  { transform: translateY(-8px) scale(1.02); }
        60%  { transform: translateY(0) scale(1); }
        64%  { transform: translateY(-5px) scale(1.01); }
        68%  { transform: translateY(0) scale(1); }
        72%  { transform: translateY(0) scale(1); }
        75%  { transform: translateY(-35px) scale(0.85); }
        78%  { transform: translateY(0) scale(1.08); }
        81%  { transform: translateY(-4px) scale(1); }
        83%  { transform: translateY(0) scale(1); }
        88%  { transform: translateY(-4px) scale(1.01); }
        92%  { transform: translateY(0) scale(1); }
        96%  { transform: translateY(-3px) scale(1); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes njd-shadow-cycle {
        0%   { transform: scaleX(1); opacity: 0.6; }
        4%   { transform: scaleX(0.85); opacity: 0.4; }
        8%   { transform: scaleX(1); opacity: 0.6; }
        22%  { transform: scaleX(1); opacity: 0.6; }
        25%  { transform: scaleX(0.5); opacity: 0.2; }
        28%  { transform: scaleX(1.2); opacity: 0.7; }
        33%  { transform: scaleX(1); opacity: 0.6; }
        72%  { transform: scaleX(1); opacity: 0.6; }
        75%  { transform: scaleX(0.5); opacity: 0.2; }
        78%  { transform: scaleX(1.2); opacity: 0.7; }
        83%  { transform: scaleX(1); opacity: 0.6; }
        100% { transform: scaleX(1); opacity: 0.6; }
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="njd-loader">
      <div class="loader-content">
        <div class="morph-container">
          <div class="logo-img">
            <img src="https://njd-services.net/images/logo.webp" alt="NJD" />
          </div>
          <div class="car-svg">
            <svg viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20,42 L25,42 L30,28 L52,26 L62,18 L88,18 L96,28 L100,42 L105,42" />
              <path d="M52,26 L55,18" />
              <path d="M30,28 L25,28" />
              <path d="M60,18 L58,12 L68,12 L66,18" />
              <line x1="35" y1="42" x2="82" y2="42" />
              <circle cx="30" cy="46" r="9" stroke-width="2.5" />
              <circle cx="30" cy="46" r="3.5" stroke-width="1.5" />
              <circle cx="90" cy="46" r="9" stroke-width="2.5" />
              <circle cx="90" cy="46" r="3.5" stroke-width="1.5" />
              <path d="M55,18 L58,26 L78,26 L88,18 Z" stroke-width="2" />
              <line x1="65" y1="32" x2="72" y2="32" stroke-width="1.8" />
              <path d="M12,44 Q16,42 20,44" stroke-width="1.5" opacity="0.5" />
              <path d="M6,42 Q10,40 14,42" stroke-width="1.2" opacity="0.3" />
            </svg>
          </div>
        </div>
        <div class="bounce-shadow"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
